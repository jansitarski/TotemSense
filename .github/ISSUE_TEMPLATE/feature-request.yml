name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do, and what's getting in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: roadmap
    attributes:
      label: Roadmap alignment
      description: Is this already on the README roadmap?
      options:
        - label: This is on the README roadmap (Poison / Disease / Grounding totem tracking, standalone addon)
        - label: This is a new idea not on the roadmap
